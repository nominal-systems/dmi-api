# Dependency stack for the black-box integration harness.
#
# Deliberately standalone rather than an override of the repo's docker-compose.yml, for two
# reasons: that file declares `env_file: .env` (and .env.example does not define the
# MYSQL_ROOT_PASSWORD / MYSQL_DATABASE the mysql:8 image needs), and it bind-mounts
# ./docker/mysql/data, which `docker compose down -v` does not remove — so it cannot give the
# harness a true cold start. Named volumes below can be wiped with `down -v`.
#
# Host ports are shifted off the defaults so a developer's `docker compose up -d mysql mongo
# activemq` dev stack can keep running alongside the harness. Override with HARNESS_*_PORT.

name: dmi-harness

services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${HARNESS_MYSQL_PASSWORD:-harness}
      MYSQL_DATABASE: ${HARNESS_MYSQL_DATABASE:-dmi_harness}
    ports:
      - '${HARNESS_MYSQL_PORT:-3307}:3306'
    volumes:
      - mysql-data:/var/lib/mysql

  mongo:
    image: mongo:4
    ports:
      - '${HARNESS_MONGO_PORT:-27018}:27017'
    volumes:
      - mongo-data:/data/db

  activemq:
    image: rmohr/activemq
    ports:
      - '${HARNESS_ACTIVEMQ_PORT:-1884}:1883'

volumes:
  mysql-data:
  mongo-data:
